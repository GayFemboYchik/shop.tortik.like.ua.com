{% extends 'base.html' %}

{% block content %}
<div class="container py-5 d-flex justify-content-center">
    <div class="instrument-card p-4 p-md-5 shadow-lg" style="max-width: 500px; width: 100%;">
        <header class="section-header mb-4 text-center">
            <h2 class="display-6 fw-bold">Реєстрація</h2>
            <div class="header-line"></div>
            <p class="text-muted mt-2">Створіть свій аккаунт, щоб почати покупки</p>
        </header>

        <form method="post" class="auth-form">
            {% csrf_token %}

            <div class="form-fields mb-4">
                {{ form.as_p }}
            </div>

            <button type="submit" class="btn-modern w-100 border-0 py-3 shadow-sm">
                <span>Зареєструватися</span>
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" class="ms-2">
                    <path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"></path>
                    <circle cx="8.5" cy="7" r="4"></circle>
                    <line x1="20" y1="8" x2="20" y2="14"></line>
                    <line x1="23" y1="11" x2="17" y2="11"></line>
                </svg>
            </button>
        </form>

        <div class="mt-4 text-center">
            <p class="small text-muted">
                Вже маєте аккаунт?
                <a href="{% url 'instrument_shop:login' %}" class="text-primary fw-bold text-decoration-none">Увійти</a>
            </p>
        </div>
    </div>
</div>

<style>
    /* Стилизация стандартных полей Django form.as_p */
    .auth-form p {
        margin-bottom: 1.5rem;
    }

    .auth-form label {
        display: block;
        font-weight: 600;
        font-size: 0.9rem;
        color: var(--dark);
        margin-bottom: 0.5rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }

    .auth-form input {
        width: 100%;
        padding: 12px 16px;
        border: 2px solid #edf2f7;
        border-radius: 12px;
        transition: all 0.3s ease;
        background-color: #f8fafc;
    }

    .auth-form input:focus {
        outline: none;
        border-color: var(--primary);
        background-color: #fff;
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
    }

    .auth-form .helptext {
        display: block;
        font-size: 0.75rem;
        color: #94a3b8;
        margin-top: 5px;
    }

    .auth-form ul.errorlist {
        list-style: none;
        padding: 0;
        margin: 0 0 10px 0;
        color: #ef4444;
        font-size: 0.85rem;
        font-weight: 600;
    }
</style>
{% endblock %}
