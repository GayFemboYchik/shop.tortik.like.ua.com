{% extends 'base.html' %}

{% block content %}
<div class="container py-5 d-flex justify-content-center">
    <div class="instrument-card p-4 p-md-5 shadow-lg" style="max-width: 450px; width: 100%;">
        <header class="section-header mb-4 text-center">
            <h2 class="display-6 fw-bold">Вхід</h2>
            <div class="header-line"></div>
            <p class="text-muted mt-2">З поверненням! Будь ласка, увійдіть у свій аккаунт</p>
        </header>

        <form method="post" class="auth-form">
            {% csrf_token %}

            <div class="form-fields mb-4">
                {{ form.as_p }}
            </div>

            <button type="submit" class="btn-modern w-100 border-0 py-3 shadow-sm">
                <span>Увійти</span>
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" class="ms-2">
                    <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M13.8 12H3"></path>
                </svg>
            </button>
        </form>

        <div class="mt-4 text-center">
            <p class="small text-muted">
                Ще не маєте аккаунту?
                <a href="{% url 'instrument_shop:register' %}" class="text-primary fw-bold text-decoration-none">Зареєструватися</a>
            </p>
        </div>
    </div>
</div>

<style>
    /* Стилизация для стандартного вывода Django form.as_p */
    .auth-form p {
        margin-bottom: 1.5rem;
    }

    .auth-form label {
        display: block;
        font-weight: 600;
        font-size: 0.85rem;
        color: var(--dark);
        margin-bottom: 0.6rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }

    .auth-form input {
        width: 100%;
        padding: 12px 16px;
        border: 2px solid #edf2f7;
        border-radius: 12px;
        transition: all 0.3s ease;
        background-color: #f8fafc;
    }

    .auth-form input:focus {
        outline: none;
        border-color: var(--primary);
        background-color: #fff;
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
    }

    /* Обработка списка ошибок */
    .errorlist {
        list-style: none;
        padding: 0;
        margin: 0 0 1rem 0;
        color: #e63946;
        font-size: 0.85rem;
        background: #fff5f5;
        border-radius: 8px;
        padding: 10px;
        border-left: 4px solid #e63946;
    }
</style>
{% endblock %}
