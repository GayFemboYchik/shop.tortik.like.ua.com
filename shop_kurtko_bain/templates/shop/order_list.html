{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <h2>Мої замовлення</h2>
    <table class="table mt-3">
        <thead>
            <tr>
                <th>ID</th>
                <th>Дата</th>
                <th>Статус</th>
                <th>Сума</th>
            </tr>
        </thead>
        <tbody>
            {% for order in orders %}
            <tr>
                <td>#{{ order.id }}</td>
                <td>{{ order.created_at|date:"d.m.Y H:i" }}</td>
                <td>{{ order.get_status_display }}</td>
                <td>{{ order.total_price }} грн</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="4">Ви ще не робили замовлень.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
