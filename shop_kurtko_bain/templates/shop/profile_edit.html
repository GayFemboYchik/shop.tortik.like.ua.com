{% extends 'base.html' %}

{% block content %}
<div class="container py-5 d-flex justify-content-center">
    <div class="instrument-card p-4 p-md-5 shadow-lg" style="max-width: 500px; width: 100%;">
        <header class="section-header mb-4 text-center">
            <h2 class="display-6 fw-bold">Редагування профілю</h2>
            <div class="header-line"></div>
        </header>

        <form method="post" class="auth-form">
            {% csrf_token %}
            <div class="form-fields mb-4">
                {{ form.as_p }}
            </div>

            <button type="submit" class="btn-modern w-100 border-0 py-3">
                <span>Зберегти зміни</span>
            </button>
        </form>
        
        <div class="mt-3 text-center">
            <a href="{% url 'instrument_shop:profile' %}" class="text-muted text-decoration-none small">← Скасувати</a>
        </div>
    </div>
</div>

<style>
    /* Використовуємо ті ж стилі, що й для реєстрації */
    .auth-form p { margin-bottom: 1.5rem; }
    .auth-form label { display: block; font-weight: 600; font-size: 0.9rem; margin-bottom: 0.5rem; text-transform: uppercase; }
    .auth-form input { width: 100%; padding: 12px; border: 2px solid #edf2f7; border-radius: 12px; }
    .auth-form input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
</style>
{% endblock %}
